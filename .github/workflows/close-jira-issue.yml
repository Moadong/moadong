  name: Close Jira Issue
  on:
    issues:
      types:
        - closed

  jobs:
    close-issue:
      name: Close Jira Issue
      runs-on: ubuntu-latest
      steps:
        - name: Extract Jira Issue Key from Title
          id: extract-key
          run: |
            TITLE="${{ github.event.issue.title }}"
            ISSUE_KEY=$(echo "$TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
            echo "JIRA_ISSUE_KEY=$ISSUE_KEY" >> $GITHUB_ENV
            echo "Extracted Jira Issue Key: $ISSUE_KEY"

        - name: Transition Jira Issue to Done
          if: env.JIRA_ISSUE_KEY != ''
          env:
            JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
            JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
            JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          run: |
            TRANSITIONS=$(curl -s \
              -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${JIRA_ISSUE_KEY}/transitions")

            TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.name == "완료") | .id')

            if [ -z "$TRANSITION_ID" ]; then
              echo "Transition '완료' not found" >&2
              echo "$TRANSITIONS" | jq '.transitions[].name' >&2
            if [ -z "$TRANSITION_ID" ]; then
              echo "Transition '완료' not found" >&2
              echo "$TRANSITIONS" | jq '.transitions[].name' >&2
              exit 1
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${JIRA_ISSUE_KEY}/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "Successfully transitioned ${JIRA_ISSUE_KEY} to 완료"
            else
              echo "Jira API error (HTTP $HTTP_CODE)" >&2
              exit 1
            fi

        - name: Add comment on GitHub issue
          if: env.JIRA_ISSUE_KEY != ''
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
            ISSUE_NUMBER: ${{ github.event.issue.number }}
          run: |
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --body "Jira Issue Closed: [${JIRA_ISSUE_KEY}](${JIRA_BASE_URL}/browse/${JIRA_ISSUE_KEY}) ✅"
