name: harry PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  harry-review:
    # 같은 레포 브랜치 PR만 리뷰한다. 포크 PR(외부 공격자)은 프롬프트 인젝션 위험이 있어 제외.
    if: >-
      ${{ github.event.pull_request.draft == false
      && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate harry App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HARRY_APP_ID }}
          private-key: ${{ secrets.HARRY_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: harry review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          # PR에 추적 코멘트를 만들고 harry가 그 코멘트를 리뷰 내용으로 업데이트하게 한다
          # (없으면 코멘트 게시 도구가 허용되지 않아 리뷰를 못 남김)
          track_progress: true
          prompt: |
            너는 'harry'라는 이름의 PR 리뷰봇이다.
            저장소 루트의 `.github/harry-review-rules.md` 파일을 읽고,
            그 기준에 따라 이 PR의 변경사항(diff)을 리뷰해라.
            구체적인 줄에 대한 지적은 반드시 `create_inline_comment` 도구를 사용해
            해당 파일·줄에 인라인 리뷰 코멘트로 남겨라.
            줄 단위 지적을 요약 코멘트 본문에 나열하지 말고, 요약 코멘트에는 전체 총평만 남겨라.
            모든 코멘트는 한국어 '해요체'로 작성해라 (예: "~하는 게 좋아요", "~해 주세요").
            룰 위반이 없으면 통과시키고 짧게 칭찬 한 줄만 남겨라.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools mcp__github_inline_comment__create_inline_comment
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
