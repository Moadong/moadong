name: Create Jira issue

on:
  issues:
    types:
      - opened

jobs:
  create-issue:
    if: contains(github.event.issue.body, '🎟️ 상위 스토리 (Story Key)')
    name: Create Jira issue
    runs-on: ubuntu-latest

    steps:
      - name: Parse Issue Form
        id: issue-parser
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          parse_field() {
            printf '%s\n' "$BODY" | awk -v lbl="$1" '
              /^### / { found=(index($0,lbl)>0); next }
              found && /[^[:space:]]/ { gsub(/\r/,""); print; found=0 }
            '
          }

          echo "dueDate=$(parse_field '마감일')" >> $GITHUB_OUTPUT
          echo "assignee=$(parse_field '담당자')" >> $GITHUB_OUTPUT
          echo "parentKey=$(parse_field '상위 스토리')" >> $GITHUB_OUTPUT
          echo "branch=$(parse_field '브랜치명')" >> $GITHUB_OUTPUT
          echo "baseBranch=$(parse_field '분기할 브랜치')" >> $GITHUB_OUTPUT

      - name: Map GitHub username to Jira accountId
        id: assignee
        env:
          FORM_ASSIGNEE: ${{ steps.issue-parser.outputs.assignee }}
          JIRA_USER_MAP: ${{ secrets.JIRA_USER_MAP }}
        run: |
          echo "$JIRA_USER_MAP" > user_map.json
          ACCOUNT_ID=$(jq -r --arg user "$FORM_ASSIGNEE" '.[$user]' user_map.json)
          echo "Resolved accountId for $FORM_ASSIGNEE → $ACCOUNT_ID"
          echo "accountId=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Check if base branch exists
        env:
          BASE_BRANCH: ${{ steps.issue-parser.outputs.baseBranch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code "$REPO_URL" "refs/heads/${BASE_BRANCH}" > /dev/null 2>&1; then
            echo "BRANCH_EXISTS=true" >> $GITHUB_ENV
          else
            echo "BRANCH_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create Jira Sub-task
        if: startsWith(steps.issue-parser.outputs.parentKey, 'MOA-') && env.BRANCH_EXISTS == 'true'
        id: create
        env:
          PARENT_KEY: ${{ steps.issue-parser.outputs.parentKey }}
          DUE_DATE: ${{ steps.issue-parser.outputs.dueDate }}
          ASSIGNEE_ID: ${{ steps.assignee.outputs.accountId }}
          SUMMARY: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          PAYLOAD_FILE=$(mktemp)
          jq -n \
            --arg summary "$SUMMARY" \
            --arg parent "$PARENT_KEY" \
            --arg assignee "$ASSIGNEE_ID" \
            --arg issue_url "$ISSUE_URL" \
            --arg issue_body "$ISSUE_BODY" \
            '{
              fields: {
                project: { key: "MOA" },
                summary: $summary,
                issuetype: { name: "하위 작업" },
                parent: { key: $parent },
                assignee: { id: $assignee },
                description: {
                  version: 1,
                  type: "doc",
                  content: [
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("GitHub Issue: " + $issue_url) }]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: $issue_body }]
                    }
                  ]
                }
              }
            }' > "$PAYLOAD_FILE"

          if [ -n "$DUE_DATE" ] && [ "$DUE_DATE" != "_No response_" ]; then
            jq --arg d "$DUE_DATE" '.fields.duedate = $d' "$PAYLOAD_FILE" > "${PAYLOAD_FILE}.tmp"
            mv "${PAYLOAD_FILE}.tmp" "$PAYLOAD_FILE"
          fi

          TMPFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TMPFILE" -w "%{http_code}" \
            -X POST \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @"$PAYLOAD_FILE" \
            "${JIRA_BASE_URL}/rest/api/3/issue")
          RESPONSE=$(cat "$TMPFILE")
          rm -f "$TMPFILE" "$PAYLOAD_FILE"

          if [ "$HTTP_CODE" = "201" ]; then
            ISSUE_KEY=$(echo "$RESPONSE" | jq -r '.key')
            echo "Created Jira issue: $ISSUE_KEY"
            echo "issue=$ISSUE_KEY" >> $GITHUB_OUTPUT
          else
            echo "Jira API error (HTTP $HTTP_CODE)" >&2
            echo "$RESPONSE" | jq -r '.errors // .errorMessages // .' >&2
            exit 1
          fi

      - name: Create branch with Jira Ticket number
        if: startsWith(steps.issue-parser.outputs.parentKey, 'MOA-') && env.BRANCH_EXISTS == 'true'
        env:
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
          JIRA_ISSUE_KEY: ${{ steps.create.outputs.issue }}
          CUSTOM_BRANCH_NAME: ${{ steps.issue-parser.outputs.branch }}
          BASE_BRANCH: ${{ steps.issue-parser.outputs.baseBranch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          SAFE=$(echo "${CUSTOM_BRANCH_NAME}" | tr ' ' '-' | tr -cd '[:alnum:]/-')
          BRANCH_TYPE=$(echo "$SAFE" | cut -d'/' -f1)
          BRANCH_DETAIL=$(echo "$SAFE" | cut -d'/' -f2-)
          [ -z "$BRANCH_DETAIL" ] && BRANCH_DETAIL="$BRANCH_TYPE"

          BRANCH_NAME="${BRANCH_TYPE}/#${GITHUB_ISSUE_NUMBER}-${BRANCH_DETAIL}-${JIRA_ISSUE_KEY}"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone --branch "${BASE_BRANCH}" --depth 1 "$REPO_URL" repo
          cd repo
          git checkout -b "${BRANCH_NAME}"
          git push origin "${BRANCH_NAME}"

      - name: Update issue title and add Jira comment
        if: startsWith(steps.issue-parser.outputs.parentKey, 'MOA-') && env.BRANCH_EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          JIRA_ISSUE_KEY: ${{ steps.create.outputs.issue }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          CUSTOM_BRANCH_NAME: ${{ steps.issue-parser.outputs.branch }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          BRANCH_TYPE=$(echo "${CUSTOM_BRANCH_NAME}" | cut -d'/' -f1)
          NEW_TITLE="[${BRANCH_TYPE}] ${JIRA_ISSUE_KEY} ${ISSUE_TITLE}"

          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --title "$NEW_TITLE"
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Jira Issue Created: [${JIRA_ISSUE_KEY}](${JIRA_BASE_URL}/browse/${JIRA_ISSUE_KEY})"
